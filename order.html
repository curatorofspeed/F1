<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your order · F1 Card Index</title>
<meta name="robots" content="noindex">
<style>
:root{--bg:#0c0d0e;--panel:#15171a;--panel2:#1b1e22;--line:#2a2e33;--txt:#eef1f3;--muted:#828c93;--gold:#d9b878;--green:#39e08a;--red:#ef6a6a;--amber:#e6b65c;--teal:#4cc9b0}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;line-height:1.55}
.wrap{max-width:520px;margin:0 auto;padding:26px 16px 90px}
a{color:var(--gold)}
.brand{font-size:13px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);text-decoration:none}
h1{font-size:24px;margin:14px 0 14px}
.state{color:var(--muted);text-align:center;padding:40px 0}.state.err{color:var(--red)}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px}
.top{display:flex;gap:14px;align-items:center;margin-bottom:16px}
.top img{width:76px;height:76px;object-fit:cover;border-radius:10px;background:var(--panel2)}
.top .tt{font-size:15px;font-weight:700;line-height:1.3}
.top .pr{font-family:ui-monospace,monospace;font-weight:800;color:var(--gold);margin-top:4px}
.steps{list-style:none;padding:0;margin:0}
.steps li{display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-top:1px solid var(--line)}
.steps li:first-child{border-top:none}
.dot{width:22px;height:22px;border-radius:50%;border:2px solid var(--line);flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted)}
.steps li.on .dot{border-color:var(--green);background:var(--green);color:#05231a}
.steps li .t{font-weight:700;font-size:14px}
.steps li.on .t{color:var(--green)}
.steps li .s{font-size:12.5px;color:var(--muted);margin-top:2px}
.track{display:block;text-align:center;background:var(--teal);color:#052;text-decoration:none;font-weight:800;border-radius:10px;padding:13px;margin-top:16px}
.foot{margin-top:30px;border-top:1px solid var(--line);padding-top:16px;font-size:13px;color:var(--muted);text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <a class="brand" href="https://www.f1cardindex.com">🏁 F1 Card Index</a>
  <h1>Your order</h1>
  <div class="state" id="state">Loading…</div>
  <div id="main" style="display:none"></div>
  <div class="foot">Need help? <a href="mailto:hello@f1cardindex.com">hello@f1cardindex.com</a></div>
</div>
<script>
const SB_URL='https://xvpvvzvmozusfvyebvyq.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh2cHZ2enZtb3p1c2Z2eWVidnlxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NDYwODgsImV4cCI6MjA5ODQyMjA4OH0.pClFgr8Mv5GegFGDEftx-03vhqJ_5AdpEnhlwbzuc7k';
const $=id=>document.getElementById(id);
const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const money=v=>v==null?'—':'$'+Math.round(Number(v)).toLocaleString();
const TOKEN=new URLSearchParams(location.search).get('t');

(async function(){
  if(!TOKEN){ $('state').textContent='This link is missing its order token.'; $('state').className='state err'; return; }
  try{
    const r=await fetch(SB_URL+'/rest/v1/rpc/buyer_order',{method:'POST',
      headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY,'Content-Type':'application/json'},body:JSON.stringify({p_token:TOKEN})});
    if(!r.ok) throw new Error((await r.json()).message||'Order not found');
    const o=await r.json(); render(o);
  }catch(e){ $('state').textContent=e.message; $('state').className='state err'; }
})();

function render(o){
  const shipped=!!o.shipped_at;
  const trk=o.tracking_number?encodeURIComponent(o.tracking_number):'';
  const trackUrl=trk?((o.carrier==='UPS')?'https://www.ups.com/track?tracknum='+trk:(o.carrier==='FedEx')?'https://www.fedex.com/fedextrack/?trknbr='+trk:'https://tools.usps.com/go/TrackConfirmAction?tLabels='+trk):'';
  let h='<div class="card"><div class="top">'
    +(o.image_url?'<img src="'+esc(o.image_url)+'">':'')
    +'<div><div class="tt">'+esc(o.title||'')+'</div><div class="pr">'+money(o.price)+'</div></div></div>'
    +'<ul class="steps">'
    +'<li class="on"><div class="dot">✓</div><div><div class="t">Payment received</div><div class="s">Your purchase is confirmed.</div></div></li>'
    +'<li class="'+(shipped?'on':'')+'"><div class="dot">'+(shipped?'✓':'2')+'</div><div><div class="t">Shipped</div><div class="s">'
      +(shipped?('Sent '+new Date(o.shipped_at).toLocaleDateString()+(o.carrier?' via '+esc(o.carrier):'')+(o.tracking_number?' · '+esc(o.tracking_number):'')):'The seller is preparing your card. You’ll get tracking here.')
      +'</div></div></li>'
    +'<li><div class="dot">3</div><div><div class="t">Delivered</div><div class="s">Track the package for the latest status.</div></div></li>'
    +'</ul>'
    +(trackUrl?'<a class="track" href="'+trackUrl+'" target="_blank" rel="noopener">🔎 Track package</a>':'')
    +'</div>';
  $('state').style.display='none'; $('main').style.display='block'; $('main').innerHTML=h;
}
</script>
</body>
</html>
