# .github/workflows/main.yml
name: f1-radar

on:
  workflow_dispatch:        # manual "Run workflow" button — use this for the first run
  schedule:
    - cron: "0 */6 * * *"   # every 6h once you've confirmed it pulls sales

permissions:
  contents: read

jobs:
  selftest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Locate worker
        id: find
        run: |
          f="$(find . -name f1_radar_worker.py | head -n1)"
          [ -z "$f" ] && { echo "::error::f1_radar_worker.py not found"; exit 1; }
          echo "Found worker at: $f"; echo "path=$f" >> "$GITHUB_OUTPUT"
      - name: Selftest (offline)
        run: python "${{ steps.find.outputs.path }}" --selftest

  ingest:
    needs: selftest          # only run if the code is valid
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps (+ Playwright browser)
        run: |
          pip install requests playwright
          python -m playwright install --with-deps chromium
      - name: Locate worker
        id: find
        run: echo "path=$(find . -name f1_radar_worker.py | head -n1)" >> "$GITHUB_OUTPUT"
      - name: Ingest Goldin -> Supabase (writes 'pending' rows)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python "${{ steps.find.outputs.path }}"
